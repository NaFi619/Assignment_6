<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Single Page App</title>
    <script>
      var pathSegmentsToKeep = 1;
      var location = window.location;
      var pathname = location.pathname;
      var search = location.search;
      var hash = location.hash;
      var segments = pathname.split('/').filter(Boolean);
      var repoName = segments.slice(0, pathSegmentsToKeep).join('/');
      var redirectUrl = location.protocol + '//' + location.host + (repoName ? '/' + repoName : '') + '/?p=/' + segments.slice(pathSegmentsToKeep).join('/') + search + hash;
      window.location.replace(redirectUrl);
    </script>
  </head>
  <body></body>
</html>
